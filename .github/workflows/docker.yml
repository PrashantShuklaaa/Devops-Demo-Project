name: Docker CI/CD
on:
 push:
  branches:
    - main
  jobs:
    build:
     run-on:
      - ubuntu-latest
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: prashuk370
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker image
        run: docker build -t prashuk370/devops-app .
      - name: Push Docker image
        run: docker push prashuk370/devops-app